name: CI — Verificación automática

# Se ejecuta en cada push y en cada Pull Request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones anteriores si hay un nuevo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Adaptar este job al stack del proyecto ────────────────────────────────
  # Este es un ejemplo genérico. Claude lo configurará para el stack real.
  verify:
    name: Verificación
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Ejemplo para proyectos Node.js — eliminar si no aplica
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        # Descomenta si usas Node.js

      # Ejemplo para proyectos Python — eliminar si no aplica
