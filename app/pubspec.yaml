# pubspec.yaml — "libro de recetas" de la app Anti Frágil.
# Lista las dependencias que Flutter instala. BOCETO: el equipo ajustará versiones.
name: anti_fragil
description: "Anti Frágil — ecosistema de salud física gamificado (MVP v1.5)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend: cliente oficial de Supabase (login + base de datos + almacenamiento)
  supabase_flutter: ^2.5.0

  # Navegación entre pantallas
  go_router: ^14.0.0

  # Reproductor de vídeo (rutinas alojadas en Vimeo/AWS)
  video_player: ^2.8.0

  # Generación/compartición de las "Tarjetas Épicas" para redes sociales
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/avatares/   # placeholders de avatares (los rellena el ilustrador humano)
