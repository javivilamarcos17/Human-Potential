<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti Frágil · Laboratorio — simulador de días</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--af-bg);font-family:var(--af-font-texto);color:var(--af-texto);padding:24px 4vw 60px}
  .wrap{max-width:980px;margin:0 auto}
  h1{font-family:var(--af-font-display);font-weight:900;font-size:26px}
  h1 span{color:var(--af-primario)}
  .sub{color:var(--af-texto-suave);font-size:13.5px;margin:4px 0 16px;line-height:1.6}
  .panel{background:var(--af-panel);border:1px solid var(--af-line);border-radius:var(--af-radio-l);backdrop-filter:blur(var(--af-blur-cristal));padding:16px;margin-bottom:14px}
  .lbl{font-size:12px;color:var(--af-texto-suave);text-transform:uppercase;letter-spacing:.5px;margin:0 0 6px}
  select{padding:9px;border-radius:10px;border:1px solid var(--af-line);background:rgba(0,0,0,.25);color:var(--af-texto);font-size:13.5px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .stats{display:flex;gap:10px;flex-wrap:wrap}
  .stat{flex:1;min-width:90px;background:rgba(0,0,0,.2);border:1px solid var(--af-line);border-radius:12px;padding:10px;text-align:center}
  .stat b{display:block;font-family:var(--af-font-display);font-weight:900;font-size:20px}
  .stat s{text-decoration:none;font-size:10px;text-transform:uppercase;color:var(--af-texto-suave)}
  .btn{font-size:13px;font-weight:700;border:1px solid var(--af-line);border-radius:20px;padding:9px 14px;cursor:pointer;background:var(--af-panel);transition:.15s}
  .btn:hover{border-color:var(--af-primario);color:var(--af-primario)}
  .btn.cta{background:linear-gradient(135deg,var(--af-primario),var(--af-primario-osc));color:#062018;border:0}
  .dia{border-left:3px solid var(--af-primario);padding:12px 14px;margin-top:10px;background:rgba(0,0,0,.18);border-radius:0 12px 12px 0}
  .dia.dolor{border-color:var(--af-ambar)} .dia.descanso{border-color:var(--af-texto-suave)} .dia.stop{border-color:var(--af-rojo)}
  .dia .dt{font-size:12px;color:var(--af-texto-suave)}
  .dia .tt{font-family:var(--af-font-display);font-weight:800;font-size:15px;margin-top:2px}
  .dia .mo{font-size:13px;color:var(--af-agua);line-height:1.45;margin-top:3px}
  .dia .ej{font-size:12.5px;color:var(--af-texto-suave);margin-top:5px;line-height:1.5}
  .dia .nu{font-size:12.5px;margin-top:5px}
  .vender{color:var(--af-dorado);font-weight:600}
  a{color:var(--af-texto-suave)}
  .err{color:var(--af-ambar)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Laboratorio · <span>simulador de días</span></h1>
  <p class="sub">Elige un perfil y vive sus días: entrena, ten dolor, quédate en casa, falla… y mira
  cómo la app le responde y le acompaña. Motor REAL de la app. <a href="../demo.html">← hub</a></p>

  <div class="panel" id="setup">
    <div class="lbl">Perfil del cliente</div>
    <div class="row">
      <select id="p-obj">
        <option value="agua">🩹 Recuperación / dolor (Agua)</option>
        <option value="fuego">🔥 Transformar el cuerpo (Fuego)</option>
        <option value="rayo">⚡ Cardio / resistencia (Rayo)</option>
        <option value="hierba">🌿 Hábito / estrés (Hierba)</option>
        <option value="roca">🪨 Fuerza (Roca)</option>
      </select>
      <select id="p-zona"><option value="bienestar general">Sin zona concreta</option><option value="zona lumbar">Lumbar</option><option value="cervicales">Cervical</option><option value="hombro">Hombro</option><option value="rodilla">Rodilla</option><option value="cadera">Cadera</option></select>
      <select id="p-aud"><option value="30">Empieza flojo (Vit. 30)</option><option value="60" selected>Nivel medio (Vit. 60)</option><option value="80">En forma (Vit. 80)</option></select>
      <button class="btn cta" onclick="iniciar()">▶ Empezar simulación</button>
    </div>
  </div>

  <div id="vivo" style="display:none">
    <div class="panel stats" id="stats"></div>
    <div class="panel">
      <div class="lbl">¿Qué pasa hoy? (pulsa para vivir el día)</div>
      <div class="row" style="margin-bottom:8px">
        <button class="btn" onclick="vivir('normal')">🏋️ Entreno bien</button>
        <button class="btn" onclick="vivir('dolor')">😣 Tengo dolor (7)</button>
        <button class="btn" onclick="vivir('doloralto')">🤕 Dolor alto (8)</button>
        <button class="btn" onclick="vivir('malanoche')">🛌 Dormí mal / estrés</button>
        <button class="btn" onclick="vivir('casa')">🏠 No voy al centro, entreno en casa</button>
        <button class="btn" onclick="vivir('noentreno')">🚫 Hoy no entreno</button>
      </div>
      <div class="lbl">¿Cómo comió hoy?</div>
      <div class="row">
        <select id="comida"><option value="bien">🟢 Comió bien</option><option value="regular">🟡 Regular</option><option value="mal">🔴 Comió mal</option></select>
        <button class="btn" onclick="reset()">↺ Reiniciar</button>
      </div>
    </div>
    <div class="panel"><div class="lbl">Lo que vivió, día a día</div><div id="timeline"></div></div>
  </div>
</div>

<script>
let M=null, DIA=0;
async function cargarMotor(){
  const html=await fetch('app-funcional.html').then(r=>r.text());
  const js=html.match(/<script>([\s\S]*)<\/script>/)[1];
  const els={};
  const fakeEl=()=>({textContent:'',innerHTML:'',value:'',max:60,checked:false,disabled:false,style:{},classList:{add(){},remove(){},toggle(){},contains:()=>false},dataset:{},querySelectorAll:()=>[],parentNode:{querySelectorAll:()=>[]},firstChild:{textContent:''}});
  const doc={getElementById:id=>els[id]||(els[id]=fakeEl()),querySelectorAll:()=>[],createElement:()=>fakeEl(),querySelector:()=>fakeEl()};
  const store={};const ls={getItem:k=>store[k]||null,setItem:(k,v)=>store[k]=v,removeItem:k=>delete store[k]};
  const FakeImg=function(){return{set src(v){if(this.onerror)this.onerror();},onload:null,onerror:null};};
  const fn=new Function('document','localStorage','navigator','location','window','alert','confirm','fetch','Image','setInterval','clearInterval','setTimeout','crypto',
    js+'\n;return {S,decidirRutina,faseDesde,terminarJornada,CONFIG,NUTRI,nivelDesdeXp,etapaDe};');
  const m=fn(doc,ls,{},{search:''},{},()=>{},()=>true,()=>Promise.resolve({ok:true}),FakeImg,()=>0,()=>{},()=>0,{randomUUID:()=>'x'});
  m._els=els; m._win={};
  return m;
}
function iso(off){const d=new Date('2026-06-01');d.setDate(d.getDate()+off);return d.toISOString().slice(0,10);}
function iniciar(){
  const S=M.S;
  S.elemento=document.getElementById('p-obj').value;
  S.perfil={nombre:'Cliente',zona:document.getElementById('p-zona').value};
  S.aud=+document.getElementById('p-aud').value; S.audInicial=S.aud;
  S.xp=0;S.ses=0;S.racha=0;S.rachaMax=0;S.hist=[];S.vida={};S.nutri={};S.pruebasHechas=Array(7).fill({f:'x'});
  S.reaud=0;S.mejora=0;S.retosLog=[];S.ultDia=null;DIA=0;
  document.getElementById('setup').style.display='none';
  document.getElementById('vivo').style.display='block';
  document.getElementById('timeline').innerHTML='';
  pintarStats();
}
function reset(){M.S.perfil=null;document.getElementById('setup').style.display='block';document.getElementById('vivo').style.display='none';document.getElementById('timeline').innerHTML='';}
function vivir(esc){
  const S=M.S, fechaHoy=iso(DIA);
  S.fechaSim=fechaHoy;
  // escenario → triaje
  let dol=2,ene=7,rpe=5,sue='Bien',est='Bajo',entrena=true,nota='';
  if(esc==='dolor'){dol=7;nota='Dolor moderado';}
  if(esc==='doloralto'){dol=8;nota='Dolor alto';}
  if(esc==='malanoche'){sue='Mal';est='Alto';ene=4;nota='Mala noche y estrés';}
  if(esc==='casa'){nota='No fue al centro — entrena en casa';}
  if(esc==='noentreno'){entrena=false;nota='Día de descanso';}
  S.vida={[fechaHoy]:{sueno:sue,estres:est}};
  S.dolorHoy=dol;
  const setEl=(id,v)=>{(M._els[id]=M._els[id]||{}).textContent=v;};
  setEl('v-energia',ene); setEl('v-dolor',dol); setEl('v-rpe',rpe);
  M._els['molestia']={checked:false};

  let dec=null;
  if(entrena){
    try{ dec=M.decidirRutina(); }catch(e){ addDia(esc,{titulo:'Error',motivo:e.message},null,nota,true); return; }
    // avanzar el estado REAL como una jornada completada
    const ayer = S.ultDia;
    S.racha=(ayer===iso(DIA-1))?S.racha+1:1; S.rachaMax=Math.max(S.rachaMax||0,S.racha);
    S.xp+=30; S.ses+=1; S.ultDia=fechaHoy;
    S.hist.push({f:fechaHoy,d:dol,e:ene,r:rpe,m:false}); if(S.hist.length>30)S.hist.shift();
  } else {
    // no entrena: la racha se romperá el próximo día que entrene
  }
  // nutrición del día
  const comida=document.getElementById('comida').value;
  registrarNutri(fechaHoy,comida);
  addDia(esc,dec,comida,nota,false);
  DIA++;
  pintarStats();
}
function registrarNutri(fecha,comida){
  const S=M.S; S.nutri=S.nutri||{};
  // mapea bien/regular/mal a tipos del NUTRI real (índices: 0=verdura,1=proteina... 11=dulce)
  const map={bien:[0,1,3,4], regular:[6,1,3,9], mal:[12,11,10,14]};
  const idx=map[comida]; const d={agua: comida==='bien'?8:comida==='regular'?5:3};
  ['desayuno','comida','cena','snack'].forEach((m,i)=>d[m]=idx[i]);
  S.nutri[fecha]=d;
}
function balanceNutri(fecha){
  const S=M.S, d=S.nutri[fecha]; if(!d)return '';
  const cols=['desayuno','comida','cena','snack'].map(k=>d[k]!=null?M.NUTRI.tipos[d[k]].color:null).filter(Boolean);
  const verde=cols.filter(c=>c==='verde').length, rojo=cols.filter(c=>c==='rojo').length;
  // consejo según objetivo + lo comido
  if(rojo>=2){const extra=M.S.elemento==='fuego'?' Hoy tu cuerpo pide compensarlo con tu entrenamiento.':' Mañana, agua y verduras.';return '🔴 Día flojo de comida.'+extra;}
  if(verde>=3)return '🟢 Comió genial — suma a su objetivo.';
  return '🟡 Comida correcta.';
}
function addDia(esc,dec,comida,nota,err){
  const cls=esc==='noentreno'?'descanso':(esc==='dolor'||esc==='doloralto')?'dolor':'';
  let cont='';
  if(err){cont=`<div class="mo err">${dec.motivo}</div>`;}
  else if(dec){
    cont=`<div class="tt">${dec.titulo}</div><div class="mo">🗣️ ${dec.motivo||'(día normal)'}</div>
      <div class="ej">🏋️ ${dec.pack.ejercicios.map(e=>e.nombre).join(' · ')}</div>
      ${dec.vender?'<div class="ej vender">💆 + la app sugiere una sesión presencial</div>':''}`;
  } else {
    cont=`<div class="tt">Descanso</div><div class="mo">🗣️ Hoy no toca entrenar. Mañana retomamos — un día libre también cuida.</div>`;
  }
  const nu=balanceNutri(iso(DIA));
  const html=`<div class="dia ${cls}">
    <div class="dt">Día ${DIA+1}${nota?' · '+nota:''}</div>
    ${cont}
    ${nu?`<div class="nu">${nu}</div>`:''}
  </div>`;
  document.getElementById('timeline').insertAdjacentHTML('afterbegin',html);
}
function pintarStats(){
  const S=M.S, fase=M.faseDesde({...S});
  document.getElementById('stats').innerHTML=
    `<div class="stat"><b>${DIA}</b><s>días vividos</s></div>
     <div class="stat"><b>${S.racha||0}</b><s>racha</s></div>
     <div class="stat"><b>${S.ses||0}</b><s>sesiones</s></div>
     <div class="stat"><b>${fase}</b><s>fase avatar</s></div>
     <div class="stat"><b>${M.nivelDesdeXp(S.xp||0)}</b><s>nivel</s></div>`;
}
(async()=>{
  try{ M=await cargarMotor(); }catch(e){
    document.getElementById('setup').innerHTML='<div class="err">No se pudo cargar el motor. Abre esta página desde el servidor local (python -m http.server 8080), no como archivo.<br>'+e.message+'</div>'; }
})();
</script>
</body>
</html>
