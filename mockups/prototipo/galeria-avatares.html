<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti Frágil · Galería de Avatares — matriz completa</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--af-bg);font-family:var(--af-font-texto);color:var(--af-texto);padding:30px 4vw}
  h1{font-family:var(--af-font-display);font-weight:900;font-size:26px}
  .sub{color:var(--af-texto-suave);font-size:13px;margin:4px 0 8px}
  h2{font-family:var(--af-font-display);font-weight:800;font-size:19px;margin-top:34px;padding-bottom:6px;border-bottom:1px solid var(--af-line)}
  h3{font-size:13px;font-weight:700;color:var(--af-texto-suave);margin:16px 0 6px;letter-spacing:.5px;text-transform:uppercase}
  .fila{display:flex;gap:8px;flex-wrap:wrap}
  .celda{background:var(--af-panel);border:1px solid var(--af-line);border-radius:14px;padding:8px 6px 6px;text-align:center;width:124px}
  .celda .n{font-size:10.5px;color:var(--af-texto-suave);margin-top:2px}
  a{color:var(--af-texto-suave)}
</style>
</head>
<body>
<h1>Galería de Avatares — matriz completa</h1>
<div class="sub">5 elementos × 3 líneas (según valoración inicial) × etapas con sub-fases.
El huevo es neutro en la app (misterio); aquí se muestra ya con elemento para diseño.
<a href="../demo.html">← hub</a></div>
<div id="out"></div>
<script>
/* Copia parametrizada del motor visual de app-funcional.html (mantener en sincronía) */
const ELEM={agua:['#9BE8F7','#2E86C1','#5BD0E8'],fuego:['#FFC371','#C0392B','#FF7E5F'],
  rayo:['#FFF3A0','#B7950B','#F4D03F'],hierba:['#A8E6A1','#1E8449','#58D68D'],roca:['#D7C4A3','#7D6608','#B7950B']};
const EMO={agua:'💧',fuego:'🔥',rayo:'⚡',hierba:'🌿',roca:'🪨'};
const ETAPAS=[[1,4,'Huevo'],[5,9,'Cría'],[10,13,'Joven'],[14,20,'Guardián'],[21,27,'Alado'],[28,30,'Deidad']];
const etapaDe=f=>ETAPAS.find(([a,b])=>f>=a&&f<=b)[2];
function svgAvatar(fase,elemento,lin){
  const et=etapaDe(fase);
  const [cA,cB,cC]=ELEM[elemento];
  const FILT={brote:'saturate(.75) brightness(1.18)',atlas:'',apex:'saturate(1.25) brightness(.88)'}[lin];
  const G=`<defs><linearGradient id="g${fase}${elemento}${lin}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${cA}"/><stop offset="1" stop-color="${cB}"/></linearGradient><linearGradient id="h${fase}${elemento}${lin}" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="${cB}"/><stop offset="1" stop-color="${cC}"/></linearGradient></defs>`;
  const g=`url(#g${fase}${elemento}${lin})`, g2=`url(#h${fase}${elemento}${lin})`;
  const ojos=(x1,x2,y,r=4)=>{
    if(lin==='apex') return `<path d="M${x1-r-1} ${y}l${r+2} ${-r+1} ${r} ${r-1}z" fill="#06283C"/><path d="M${x2-r+1} ${y}l${r} ${-r+1} ${r+2} ${r-1}z" fill="#06283C"/><circle cx="${x1+1}" cy="${y-1.5}" r="1.3" fill="#fff"/><circle cx="${x2+2}" cy="${y-1.5}" r="1.3" fill="#fff"/>`;
    const rr=lin==='brote'?r+1.6:r;
    return `<circle cx="${x1}" cy="${y}" r="${rr}" fill="#06283C"/><circle cx="${x2}" cy="${y}" r="${rr}" fill="#06283C"/><circle cx="${x1+1.5}" cy="${y-1.7}" r="${lin==='brote'?2.1:1.4}" fill="#fff"/><circle cx="${x2+1.5}" cy="${y-1.7}" r="${lin==='brote'?2.1:1.4}" fill="#fff"/>`;};
  let b='';
  if(et==='Huevo'){
    const casc=`<path d="M75 16C50 44 42 68 47 92a28 28 0 0 0 56 0c5-24-3-48-28-76z" fill="${g}"/>`;
    const runas='<path d="M58 52l8 10 9-13 9 13 8-10" stroke="#E8FBFF" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M62 96l6-7 7 8 7-8 6 7" stroke="rgba(232,251,255,.55)" stroke-width="2.5" fill="none"/>';
    const grietas='<path d="M68 34l5 12-8 9 11 7-4 12" stroke="#FFF6D6" stroke-width="2.2" fill="none" stroke-linecap="round"/><path d="M92 46l-6 10 7 8-9 8" stroke="#FFF6D6" stroke-width="2" fill="none" stroke-linecap="round"/>';
    const latido='<circle cx="75" cy="74" r="5" fill="#E8FBFF" opacity=".9"/>';
    const rayos='<path d="M75 6v-8M40 26l-7-7M110 26l7-7M30 70h-10M120 70h10" stroke="#F4C430" stroke-width="3" stroke-linecap="round"/>';
    if(fase<=1)b=casc+latido;else if(fase===2)b=casc+runas+latido;else if(fase===3)b=casc+runas+grietas;else b=casc+runas+grietas+rayos;
  }
  else if(et==='Cría') b=`<path d="M75 30c-17 0-28 12-28 28 0 12 6 20 14 28l-7 12 14-6c2 1 5 1 7 1s5 0 7-1l14 6-7-12c8-8 14-16 14-28 0-16-11-28-28-28z" fill="${g}"/><path d="M75 12c6 8 10 13 10 19a10 10 0 1 1-20 0c0-6 4-11 10-19z" fill="${cA}"/><path d="M47 62c-7 1-12 6-13 12 6 1 11-1 15-5M103 62c7 1 12 6 13 12-6 1-11-1-15-5" fill="${cC}"/>${ojos(64,86,58,5)}<path d="M68 72c3 3 11 3 14 0" stroke="#06283C" stroke-width="2.6" stroke-linecap="round" fill="none"/>`;
  else if(et==='Joven') b=`<path d="M75 26L58 44l-4 26 6 30c4 8 10 12 15 12s11-4 15-12l6-30-4-26L75 26z" fill="${g}"/><path d="M75 8l9 16-9 8-9-8 9-16z" fill="${cA}"/><path d="M54 56c-10-2-18 2-22 10 7 3 14 2 20-3M96 56c10-2 18 2 22 10-7 3-14 2-20-3" fill="${g2}"/><path d="M70 112l-6 16 11-7 11 7-6-16" fill="${cB}"/>${ojos(66,84,52)}<path d="M69 64c3 2 9 2 12 0" stroke="#06283C" stroke-width="2.4" stroke-linecap="round" fill="none"/>`;
  else if(et==='Guardián') b=`<path d="M75 24L52 38l-8 24 8 20-4 26c8 8 18 12 27 12s19-4 27-12l-4-26 8-20-8-24-23-14z" fill="${g}"/><path d="M75 4l12 18-12 10-12-10L75 4z" fill="${cA}"/><path d="M44 62c-12-4-22 0-28 10 8 4 17 3 24-3l4-7zM106 62c12-4 22 0 28 10-8 4-17 3-24-3l-4-7z" fill="${g2}"/><path d="M52 38l-14-8 6 16M98 38l14-8-6 16" fill="${cC}"/><path d="M60 118l-8 20 13-8M90 118l8 20-13-8" fill="${cB}"/>${ojos(64,86,54)}<path d="M66 66c4 3 14 3 18 0" stroke="#06283C" stroke-width="2.6" stroke-linecap="round" fill="none"/><path d="M58 84l8 6 9-8 9 8 8-6" stroke="#E8FBFF" stroke-width="2.5" fill="none" opacity=".8"/>`;
  else if(et==='Alado') b=`<path d="M40 54C18 42 8 48 4 64c12 8 24 8 34 0l2-10zM110 54c22-12 32-6 36 10-12 8-24 8-34 0l-2-10z" fill="${g2}" opacity=".95"/><path d="M75 18L54 34l-6 26 6 22-2 28c6 10 14 14 23 14s17-4 23-14l-2-28 6-22-6-26-21-16z" fill="${g}"/><path d="M75 0l13 18-13 12-13-12L75 0z" fill="${cA}"/><path d="M62 124l-10 22 15-9M88 124l10 22-15-9" fill="${cB}"/>${ojos(64,86,50)}<path d="M66 62c4 3 14 3 18 0" stroke="#06283C" stroke-width="2.6" stroke-linecap="round" fill="none"/><circle cx="75" cy="84" r="56" fill="none" stroke="rgba(244,196,48,.4)" stroke-width="2" stroke-dasharray="5 9"/>`;
  else b=`<path d="M30 50C10 36 2 44 0 60c10 9 22 10 32 2l-2-12zM120 50c20-14 28-6 30 10-10 9-22 10-32 2l2-12z" fill="${g2}"/><path d="M75 14L52 30l-7 28 7 24-3 30c7 11 16 16 26 16s19-5 26-16l-3-30 7-24-7-28-23-16z" fill="${g}"/><path d="M75 0l8 10 10-4-2 12 10 6-12 6-2 12-12-8-12 8-2-12-12-6 10-6-2-12 10 4 8-10z" fill="#F4C430"/>${ojos(64,86,48)}<path d="M64 60c5 4 17 4 22 0" stroke="#06283C" stroke-width="2.8" stroke-linecap="round" fill="none"/><path d="M56 82l9 7 10-9 10 9 9-7" stroke="#F4C430" stroke-width="3" fill="none"/><path d="M60 128l-9 22 14-9M90 128l9 22-14-9" fill="${cB}"/><circle cx="75" cy="80" r="62" fill="none" stroke="#F4C430" stroke-width="2.5" opacity=".7"/>`;
  // sub-fases
  const ETI={'Huevo':1,'Cría':5,'Joven':10,'Guardián':14,'Alado':21,'Deidad':28};
  const sub=fase-(ETI[et]||1);let extra='';
  if(et!=='Huevo'){
    if(sub>=1)extra+=`<circle cx="75" cy="84" r="50" fill="none" stroke="rgba(91,208,232,.35)" stroke-width="1.5" stroke-dasharray="3 10"/>`;
    if(sub>=2)extra+=`<path d="M60 100l6 4 9-5 9 5 6-4" stroke="${cA}" stroke-width="2.5" fill="none" opacity=".9"/>`;
    if(sub>=3)extra+=`<g fill="${cA}"><circle cx="32" cy="50" r="2.5"/><circle cx="118" cy="60" r="2"/><circle cx="48" cy="120" r="2"/></g>`;
    if(sub>=4)extra+=`<path d="M48 36l-8-10M102 36l8-10" stroke="#F4C430" stroke-width="3" stroke-linecap="round"/>`;
    if(sub>=5)extra+=`<circle cx="75" cy="84" r="58" fill="none" stroke="rgba(244,196,48,.5)" stroke-width="2"/>`;
    if(sub>=6)extra+=`<path d="M75 22l4 7h-8z" fill="#F4C430"/><path d="M55 26l-3-9M95 26l3-9" stroke="#F4C430" stroke-width="2.5" stroke-linecap="round"/>`;
  }
  return `<svg width="108" height="108" viewBox="0 0 150 150" fill="none" style="filter:${FILT}">${G}${b}${extra}</svg>`;
}
const FASES_CLAVE=[1,2,3,4, 5,7,9, 10,12, 14,17,20, 21,24,27, 28,30];
const LINEAS=[['brote','🌱 Brote (Vitalidad 0-40)'],['atlas','🛡️ Atlas (41-70)'],['apex','⚡ Apex (71-100)']];
let html='';
for(const el of Object.keys(ELEM)){
  html+=`<h2>${EMO[el]} ${el.toUpperCase()}</h2>`;
  for(const [lin,nombre] of LINEAS){
    html+=`<h3>${nombre}</h3><div class="fila">`;
    for(const f of FASES_CLAVE)
      html+=`<div class="celda">${svgAvatar(f,el,lin)}<div class="n">F${f} · ${etapaDe(f)}</div></div>`;
    html+='</div>';
  }
}
document.getElementById('out').innerHTML=html;
</script>
</body>
</html>
